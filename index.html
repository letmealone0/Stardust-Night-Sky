<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>深空探索 | Deep Space Explorer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      background: #000005;
      font-family: 'Inter', 'Poppins', 'Segoe UI', system-ui, sans-serif;
      color: #fff;
    }

    canvas {
      display: block;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    /* 加载画面 */
    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000005;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }

    #loading.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    #loading h1 {
      font-size: 2rem;
      font-weight: 300;
      letter-spacing: 8px;
      color: rgba(150, 200, 255, 0.8);
      margin-bottom: 20px;
      text-shadow: 0 0 30px rgba(100, 150, 255, 0.3);
    }

    #loading p {
      font-size: 0.9rem;
      color: rgba(150, 180, 220, 0.6);
      letter-spacing: 2px;
    }

    .loading-bar {
      width: 200px;
      height: 2px;
      background: rgba(100, 150, 255, 0.2);
      margin-top: 30px;
      border-radius: 1px;
      overflow: hidden;
    }

    .loading-bar-inner {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, rgba(100, 150, 255, 0.8), rgba(150, 200, 255, 0.9));
      transition: width 0.3s ease;
      box-shadow: 0 0 10px rgba(100, 150, 255, 0.5);
    }

    /* 扫描线动画 */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(100, 150, 255, 0.015) 2px,
        rgba(100, 150, 255, 0.015) 4px
      );
      pointer-events: none;
      z-index: 999;
    }

    /* 跃迁光晕 */
    body::after {
      content: '';
      position: fixed;
      top: 50%;
      left: 50%;
      width: 200vmax;
      height: 200vmax;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle at center,
        rgba(100, 150, 255, 0) 0%,
        rgba(100, 150, 255, 0) 30%,
        rgba(100, 150, 255, 0.08) 60%,
        rgba(80, 120, 255, 0.15) 80%,
        rgba(60, 100, 255, 0.25) 100%
      );
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
      z-index: 998;
    }

    body.warp-active::after {
      opacity: 1;
    }

    /* 黑洞危险区域红色边框警告 */
    @keyframes danger-pulse {
      0%, 100% { box-shadow: inset 0 0 80px rgba(255, 50, 50, 0.3); }
      50% { box-shadow: inset 0 0 120px rgba(255, 50, 50, 0.6); }
    }

    body.danger-zone {
      animation: danger-pulse 1s ease-in-out infinite;
    }

    @keyframes danger-blink {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>
  <!-- 加载画面 -->
  <div id="loading">
    <h1>深空探索</h1>
    <p>正在初始化引擎...</p>
    <div class="loading-bar">
      <div class="loading-bar-inner" id="loadingBar"></div>
    </div>
  </div>

  <!-- Three.js 画布 -->
  <canvas id="canvas"></canvas>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
