<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>深空探索 | Deep Space Explorer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      background: #000005;
      font-family: 'Inter', 'Poppins', 'Segoe UI', system-ui, sans-serif;
      color: #fff;
    }

    canvas {
      display: block;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    /* 加载画面 */
    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000005;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }

    #loading.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    #loading h1 {
      font-size: 2rem;
      font-weight: 300;
      letter-spacing: 8px;
      color: rgba(150, 200, 255, 0.8);
      margin-bottom: 20px;
      text-shadow: 0 0 30px rgba(100, 150, 255, 0.3);
    }

    #loading p {
      font-size: 0.9rem;
      color: rgba(150, 180, 220, 0.6);
      letter-spacing: 2px;
    }

    .loading-bar {
      width: 200px;
      height: 2px;
      background: rgba(100, 150, 255, 0.2);
      margin-top: 30px;
      border-radius: 1px;
      overflow: hidden;
    }

    .loading-bar-inner {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, rgba(100, 150, 255, 0.8), rgba(150, 200, 255, 0.9));
      transition: width 0.3s ease;
      box-shadow: 0 0 10px rgba(100, 150, 255, 0.5);
    }
  </style>
  <script type="module" crossorigin src="/assets/index-7bz_nfo8.js"></script>
</head>
<body>
  <!-- 加载画面 -->
  <div id="loading">
    <h1>深空探索</h1>
    <p>正在初始化引擎...</p>
    <div class="loading-bar">
      <div class="loading-bar-inner" id="loadingBar"></div>
    </div>
  </div>

  <!-- Three.js 画布 -->
  <canvas id="canvas"></canvas>

</body>
</html>
